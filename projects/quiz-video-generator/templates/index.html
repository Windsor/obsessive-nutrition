<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Video Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <h1>🎬 Quiz Video Generator</h1>
        </div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-button active" data-tab="quizzes">My Quizzes</button>
            <button class="tab-button" data-tab="create">Create New</button>
            <button class="tab-button" data-tab="videos">Video Library</button>
            <button class="tab-button" data-tab="settings">Settings</button>
        </div>

        <!-- Quizzes Tab -->
        <div id="quizzes-tab" class="tab-content active">
            <div class="card">
                <h2>My Quizzes</h2>
                <div id="quiz-list" class="quiz-list">
                    <div class="loading">Loading quizzes</div>
                </div>
            </div>
        </div>

        <!-- Create New Tab -->
        <div id="create-tab" class="tab-content">
            <div class="card">
                <h2>Create New Quiz</h2>
                
                <div class="form-group">
                    <label>Quick Start - Load Sample Data</label>
                    <div class="grid-2">
                        <button onclick="loadSampleData('geography')">🌍 Geography (Open)</button>
                        <button onclick="loadSampleData('movies')">🎬 Movie Quiz</button>
                        <button onclick="loadSampleData('geography_mc')">🌍 Geography (Multiple Choice)</button>
                    </div>
                </div>

                <hr style="margin: 30px 0; border-color: #0f3460;">

                <form id="create-quiz-form">
                    <div class="form-group">
                        <label for="quiz-name">Quiz Name *</label>
                        <input type="text" id="quiz-name" required placeholder="e.g., World Capitals Challenge">
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label for="quiz-category">Category *</label>
                            <select id="quiz-category" required>
                                <option value="geography">Geography</option>
                                <option value="movies">Movies</option>
                                <option value="trivia">General Trivia</option>
                                <option value="custom">Custom</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="quiz-difficulty">Difficulty</label>
                            <select id="quiz-difficulty">
                                <option value="easy">Easy</option>
                                <option value="medium" selected>Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="quiz-format">Video Format</label>
                        <select id="quiz-format">
                            <option value="16:9">Horizontal (16:9 - YouTube)</option>
                            <option value="9:16">Vertical (9:16 - TikTok/Shorts)</option>
                        </select>
                    </div>

                    <button type="submit">Create Quiz</button>
                </form>
            </div>
        </div>

        <!-- Videos Tab -->
        <div id="videos-tab" class="tab-content">
            <div class="card">
                <h2>Video Library</h2>
                <div id="video-list" class="video-grid">
                    <div class="loading">Loading videos</div>
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings-tab" class="tab-content">
            <div class="card">
                <h2>Settings</h2>
                <form id="settings-form">
                    <div class="form-group">
                        <label for="elevenlabs-key">ElevenLabs API Key</label>
                        <input type="text" id="elevenlabs-key" placeholder="Enter your API key">
                        <small style="color: #888; display: block; margin-top: 5px;">
                            Get your API key from <a href="https://elevenlabs.io" target="_blank" style="color: #00d4ff;">elevenlabs.io</a>
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="voice-id">Voice ID</label>
                        <input type="text" id="voice-id" placeholder="EXAVITQu4vr4xnSDxMaL">
                        <small style="color: #888; display: block; margin-top: 5px;">
                            Find voice IDs in your ElevenLabs dashboard
                        </small>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label for="countdown-duration">Countdown Duration (seconds)</label>
                            <input type="number" id="countdown-duration" min="3" max="10" value="5">
                        </div>

                        <div class="form-group">
                            <label for="default-format">Default Video Format</label>
                            <select id="default-format">
                                <option value="16:9">Horizontal (16:9)</option>
                                <option value="9:16">Vertical (9:16)</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit">Save Settings</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Quiz Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Quiz</h2>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            
            <div id="edit-quiz-content">
                <!-- Content loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Add Question Modal -->
    <div id="question-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Question</h2>
                <button class="close-modal" onclick="closeQuestionModal()">&times;</button>
            </div>
            
            <form id="add-question-form">
                <div class="form-group">
                    <label for="question-type">Question Type</label>
                    <select id="question-type" onchange="toggleChoices()">
                        <option value="open">Open Answer</option>
                        <option value="multiple_choice">Multiple Choice</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="question-text">Question *</label>
                    <textarea id="question-text" required placeholder="What is the capital of France?"></textarea>
                </div>

                <div id="choices-section" style="display: none;">
                    <div class="form-group">
                        <label>Choices</label>
                        <div id="choices-list">
                            <div class="choice-row" style="display:flex; gap:8px; margin-bottom:8px;">
                                <span style="color:#e65050; font-weight:bold; padding-top:8px;">A.</span>
                                <input type="text" class="choice-input" placeholder="Choice A">
                            </div>
                            <div class="choice-row" style="display:flex; gap:8px; margin-bottom:8px;">
                                <span style="color:#5096e6; font-weight:bold; padding-top:8px;">B.</span>
                                <input type="text" class="choice-input" placeholder="Choice B">
                            </div>
                            <div class="choice-row" style="display:flex; gap:8px; margin-bottom:8px;">
                                <span style="color:#50c850; font-weight:bold; padding-top:8px;">C.</span>
                                <input type="text" class="choice-input" placeholder="Choice C">
                            </div>
                            <div class="choice-row" style="display:flex; gap:8px; margin-bottom:8px;">
                                <span style="color:#e6b432; font-weight:bold; padding-top:8px;">D.</span>
                                <input type="text" class="choice-input" placeholder="Choice D">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="answer-text">Correct Answer *</label>
                    <input type="text" id="answer-text" required placeholder="Paris">
                    <small id="answer-hint" style="color: #888; display: none; margin-top: 5px;">
                        Enter the correct choice text (must match one of the choices above)
                    </small>
                </div>

                <div class="form-group">
                    <label for="question-image">Image (optional)</label>
                    <input type="file" id="question-image" accept="image/*" class="file-upload">
                    <img id="image-preview" class="image-preview" style="display: none;">
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit">Add Question</button>
                    <button type="button" class="secondary" onclick="closeQuestionModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
